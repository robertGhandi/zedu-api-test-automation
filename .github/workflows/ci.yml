name: API Test Automation CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env file
        run: |
          echo "BASE_URL=https://api.zedu.chat/api/v1" >> .env
          echo "INVALID_EMAIL=invalid-email" >> .env
          echo "DEFAULT_PASSWORD=Password123!" >> .env
          echo "WRONG_PASSWORD=WrongPassword123!" >> .env

      - name: Run tests and generate report
        run: |
          pytest -s -v --junitxml=report.xml

      - name: Upload test report (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: report.xml