name: API Test Automation CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Functional Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env file
        run: |
          echo "BASE_URL=https://api.zedu.chat/api/v1" >> .env
          echo "INVALID_EMAIL=invalid-email" >> .env
          echo "DEFAULT_PASSWORD=Password123!" >> .env
          echo "WRONG_PASSWORD=WrongPassword123!" >> .env

      - name: Run functional tests and generate report
        run: |
          pytest -s -v -m "not contract" --junitxml=report.xml

      - name: Upload test report (artifact)
        if: always()  # Ensure this step runs even if the tests fail
        uses: actions/upload-artifact@v4
        with:
          name: functional-report
          path: report.xml

  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    continue-on-error: true # Allow this job to fail without affecting the overall workflow status

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env file
        run: |
          echo "BASE_URL=https://api.zedu.chat/api/v1" >> .env
          echo "INVALID_EMAIL=invalid-email" >> .env
          echo "DEFAULT_PASSWORD=Password123!" >> .env
          echo "WRONG_PASSWORD=WrongPassword123!" >> .env

      - name: Run contract tests
        run: |
          pytest -s -v tests/contract --junitxml=contract-report.xml

      - name: Upload contract test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-report
          path: contract-report.xml